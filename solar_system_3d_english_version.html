<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>3D Solar System Simulation</title>
<style>
  html, body { margin:0; padding:0; height:100%; background:#06080f; overflow:hidden; font-family:Arial,Helvetica,sans-serif; }
  #wrap { position:relative; width:100%; height:100%; }
  canvas { display:block; width:100%; height:100%; cursor:grab; touch-action:none; }
  #labels { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
  .corner-btn { position:absolute; top:calc(10px + env(safe-area-inset-top)); width:40px; height:40px; padding:0; font-size:18px; line-height:1; color:#dfe6f5; background:rgba(8,12,24,0.85); border:1px solid rgba(255,255,255,0.3); border-radius:8px; cursor:pointer; z-index:30; }
  #menuBtn { left:10px; display:none; }
  #musicBtn { right:10px; font-size:16px; }
  #panel { position:absolute; top:0; left:0; bottom:0; width:164px; background:rgba(8,12,24,0.92); padding:12px; padding-top:calc(12px + env(safe-area-inset-top)); overflow-y:auto; box-sizing:border-box; z-index:20; transition:transform 0.25s; }
  #infoPanel { position:absolute; top:0; right:0; bottom:0; width:210px; background:rgba(8,12,24,0.94); padding:14px; padding-top:calc(14px + env(safe-area-inset-top)); overflow-y:auto; box-sizing:border-box; z-index:20; }
  .lbl-sec { font-size:11px; color:#7c87a3; margin-top:10px; }
  .chk { display:flex; gap:6px; font-size:12px; color:#c8d1e6; margin:4px 0; align-items:center; cursor:pointer; }
  .chk input { margin:0; }
  @media (max-width: 700px) {
    #menuBtn { display:block; }
    #panel { width:186px; transform:translateX(-105%); }
    #panel.open { transform:none; }
    #infoPanel { width:76%; max-width:250px; display:none; }
  }
</style>
</head>
<body>

<audio id="bgm" src="Audio_Solar_system_3d.MP3" loop preload="auto"></audio>

<div id="wrap">
  <canvas id="space"></canvas>
  <div id="labels"></div>

  <button id="menuBtn" class="corner-btn" aria-label="Open body list">☰</button>
  <button id="musicBtn" class="corner-btn" aria-label="Toggle background music">♪</button>

  <div id="panel">
    <div style="font-size:13px;font-weight:bold;color:#dfe6f5;letter-spacing:1px;">SOLAR SYSTEM</div>
    <div class="lbl-sec" style="margin-top:8px;">SIMULATION DATE</div>
    <div id="simDate" style="font-size:13px;color:#dfe6f5;margin-bottom:10px;">—</div>
    <div class="lbl-sec">TIME CONTROL</div>
    <div style="display:flex;align-items:center;gap:6px;margin:4px 0;">
      <button id="playBtn" aria-label="Pause" style="width:34px;height:26px;padding:0;font-size:11px;line-height:1;color:#dfe6f5;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.3);border-radius:6px;cursor:pointer;">❚❚</button>
      <span id="spdOut" style="font-size:12px;color:#dfe6f5;">10 days/s</span>
    </div>
    <input type="range" id="spd" min="0" max="200" step="1" value="10" style="width:100%;" />
    <div class="lbl-sec">DISPLAY</div>
    <label class="chk"><input type="checkbox" id="cbOrbit" checked />Orbit lines</label>
    <label class="chk"><input type="checkbox" id="cbLabel" checked />Labels</label>
    <label class="chk"><input type="checkbox" id="cbBelt" checked />Asteroid belt</label>
    <div class="lbl-sec">BODIES</div>
    <div id="bodyList"></div>
    <div id="hint" style="font-size:11px;color:#5d6680;margin-top:12px;line-height:1.6;padding-bottom:8px;">Drag = orbit · Scroll = zoom · Click = fly to</div>
  </div>

  <div id="infoPanel">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div id="ipName" style="font-size:16px;font-weight:bold;color:#eef2fb;">Sun</div>
      <button id="ipClose" aria-label="Close info panel" style="width:28px;height:28px;padding:0;font-size:15px;line-height:1;color:#9aa6c2;border:none;background:transparent;cursor:pointer;">✕</button>
    </div>
    <img id="ipImg" alt="" style="width:100%;height:100px;object-fit:cover;border-radius:8px;margin:10px 0;background:#101627;" />
    <div id="ipDesc" style="font-size:12px;color:#b6c0d8;line-height:1.65;"></div>
    <div id="ipStats" style="margin-top:12px;border-top:1px solid rgba(120,140,190,0.3);padding-top:10px;"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const TEX = 'https://cdn.jsdelivr.net/gh/KyleGough/solar-system@master/static/textures/';
const wrap = document.getElementById('wrap');
const canvas = document.getElementById('space');
const labelLayer = document.getElementById('labels');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 4000);
const loader = new THREE.TextureLoader();
loader.crossOrigin = 'anonymous';

const mqMobile = window.matchMedia('(max-width: 700px)');
let isMobile = mqMobile.matches;
const panel = document.getElementById('panel');
const ip = document.getElementById('infoPanel');
const menuBtn = document.getElementById('menuBtn');

function applyLayout(){
  isMobile = mqMobile.matches;
  document.getElementById('hint').textContent = isMobile
    ? '1 finger = orbit · Pinch = zoom · Tap = fly to'
    : 'Drag = orbit · Scroll = zoom · Click = fly to';
  if (!isMobile){ panel.classList.remove('open'); ip.style.display = ''; }
}
menuBtn.addEventListener('click', () => {
  const opening = !panel.classList.contains('open');
  panel.classList.toggle('open');
  if (opening) ip.style.display = 'none';
});

const bgm = document.getElementById('bgm');
const musicBtn = document.getElementById('musicBtn');
let musicOn = false, userMuted = false;
function setMusic(on){
  musicOn = on;
  musicBtn.style.opacity = on ? '1' : '0.45';
  musicBtn.style.textDecoration = on ? 'none' : 'line-through';
  musicBtn.setAttribute('aria-label', on ? 'Mute music' : 'Play music');
  if (on) bgm.play().catch(()=>{ musicOn = false; musicBtn.style.opacity = '0.45'; });
  else bgm.pause();
}
musicBtn.addEventListener('click', () => { userMuted = musicOn; setMusic(!musicOn); });
bgm.volume = 0.55;
bgm.play().then(()=>{ musicOn = true; musicBtn.style.opacity = '1'; }).catch(()=>{
  musicBtn.style.opacity = '0.45';
  const kick = () => { if (!userMuted && !musicOn) setMusic(true); window.removeEventListener('pointerdown', kick); };
  window.addEventListener('pointerdown', kick);
});

function resize(){
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h, false);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  camera.aspect = w/h; camera.updateProjectionMatrix();
}
window.addEventListener('resize', () => { applyLayout(); resize(); });

scene.add(new THREE.AmbientLight(0x46506c, 0.9));
scene.add(new THREE.PointLight(0xfff2cc, 1.6, 0, 2));

const starGeo = new THREE.BufferGeometry();
const starPos = [];
for (let i=0;i<1200;i++){
  const r = 900 + Math.random()*800, th = Math.random()*Math.PI*2, ph = Math.acos(2*Math.random()-1);
  starPos.push(r*Math.sin(ph)*Math.cos(th), r*Math.cos(ph), r*Math.sin(ph)*Math.sin(th));
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xb9c4e0, size:1.4, sizeAttenuation:false})));

const bodies = [];
function makeBody(cfg, parent){
  let geo;
  if (cfg.lumpy){
    geo = new THREE.SphereGeometry(cfg.r, 10, 8);
    const p = geo.attributes.position;
    for (let i=0;i<p.count;i++){
      const s = 0.72 + Math.sin(i*12.9898)*0.5*0.28 + Math.random()*0.22;
      p.setXYZ(i, p.getX(i)*s, p.getY(i)*s*0.85, p.getZ(i)*s);
    }
    geo.computeVertexNormals();
  } else {
    geo = new THREE.SphereGeometry(cfg.r, 36, 26);
  }
  const mat = cfg.emissive
    ? new THREE.MeshBasicMaterial({color: cfg.color})
    : new THREE.MeshLambertMaterial({color: cfg.color});
  if (cfg.tex){
    loader.load(TEX + cfg.tex, t => { mat.map = t; mat.color.set(cfg.tint || 0xffffff); mat.needsUpdate = true; });
  }
  const mesh = new THREE.Mesh(geo, mat);
  const pivot = new THREE.Object3D();
  (parent ? parent.mesh : scene).add(pivot);
  pivot.add(mesh);
  mesh.position.x = cfg.orbit || 0;
  const b = {...cfg, mesh, pivot, parent, angle: Math.random()*Math.PI*2};
  mesh.userData.body = b;
  bodies.push(b);
  if (cfg.orbit){
    const pts = [];
    for (let i=0;i<=128;i++){ const a = i/128*Math.PI*2; pts.push(new THREE.Vector3(Math.cos(a)*cfg.orbit, 0, Math.sin(a)*cfg.orbit)); }
    const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({color: parent?0x2e3a5c:0x39466e, transparent:true, opacity: parent?0.35:0.5}));
    (parent ? parent.mesh : scene).add(line);
    b.orbitLine = line;
  }
  return b;
}

const sun = makeBody({name:'Sun', color:0xf6c24a, r:9, emissive:true, indent:0, fly:32, tex:'sun.jpg',
  desc:'The star at the center of our system, holding 99.86% of its total mass. Surface temperature is about 5,500°C, while the core reaches 15 million °C as nuclear fusion turns hydrogen into helium.',
  stats:[['Diameter','1,392,700 km'],['Star type','G2V yellow dwarf'],['Age','~4.6 billion years'],['Surface temp','5,500°C']]});
const halo = new THREE.Mesh(new THREE.SphereGeometry(10.5, 32, 24),
  new THREE.MeshBasicMaterial({color:0xf6c24a, transparent:true, opacity:0.16}));
sun.mesh.add(halo);

const P = [
  {name:'Mercury', color:0xb5a99a, r:1.3, orbit:24, period:88, tex:'mercury.jpg',
   desc:'The smallest planet and closest to the Sun. With almost no atmosphere, temperatures swing wildly: 427°C by day, plunging to -173°C at night.',
   stats:[['Diameter','4,879 km'],['Distance from Sun','0.39 AU'],['Orbital period','88 days'],['Moons','0']]},
  {name:'Venus', color:0xe8c97a, r:2.2, orbit:35, period:225, tex:'venus.jpg',
   desc:'The hottest planet (462°C) due to a runaway greenhouse effect from its dense CO₂ atmosphere. It spins backwards, so a Venusian day is longer than its year.',
   stats:[['Diameter','12,104 km'],['Distance from Sun','0.72 AU'],['Orbital period','225 days'],['Moons','0']]},
  {name:'Earth', color:0x4f93d8, r:2.3, orbit:48, period:365.25, tex:'earth.jpg',
   desc:'The only known world with life, with 71% of its surface covered by liquid-water oceans. An oxygen-rich atmosphere and strong magnetic field shield it from cosmic radiation.',
   stats:[['Diameter','12,742 km'],['Distance from Sun','1 AU (150 million km)'],['Orbital period','365.3 days'],['Moons','1']],
   moons:[{name:'Moon', color:0xc9ccd4, r:0.7, orbit:5, period:27.3, tex:'moon.jpg',
     desc:'Earth\'s only natural satellite, formed about 4.5 billion years ago. It always shows the same face to Earth due to tidal locking.',
     stats:[['Diameter','3,475 km'],['Distance from Earth','384,400 km'],['Orbital period','27.3 days']]}]},
  {name:'Mars', color:0xd2694a, r:1.7, orbit:64, period:687, tex:'mars.jpg',
   desc:'The "Red Planet" — its color comes from iron oxide on the surface. Home to Olympus Mons, a 21.9 km volcano, and Valles Marineris, a 4,000 km canyon, both the largest in the solar system.',
   stats:[['Diameter','6,779 km'],['Distance from Sun','1.52 AU'],['Orbital period','687 days'],['Moons','2']],
   moons:[
    {name:'Phobos', color:0x9a8f85, r:0.38, orbit:3, period:0.32, tex:'moon.jpg', tint:0xb09a82, lumpy:true,
     desc:'A potato-shaped little moon that circles Mars in just 7.7 hours, slowly spiraling inward — in a few tens of millions of years it will break apart or crash down.',
     stats:[['Size','~22 km'],['Orbital period','7.7 hours']]},
    {name:'Deimos', color:0x8a8078, r:0.32, orbit:4.4, period:1.26, tex:'moon.jpg', tint:0xc0ab90, lumpy:true,
     desc:'The outer and smaller of Mars\'s moons, blanketed in a thick layer of regolith dust that makes it look smoother than Phobos.',
     stats:[['Size','~12 km'],['Orbital period','30 hours']]}]},
  {name:'Jupiter', color:0xd9a778, r:6, orbit:100, period:4333, tex:'jupiter.jpg',
   desc:'The largest gas giant, more massive than all other planets combined. The Great Red Spot is a colossal storm that has raged for at least 350 years.',
   stats:[['Diameter','139,820 km'],['Distance from Sun','5.2 AU'],['Orbital period','11.9 years'],['Moons','95']],
   moons:[
    {name:'Io', color:0xe3c569, r:0.6, orbit:8.5, period:1.77, tex:'io.jpg',
     desc:'The most volcanically active body in the solar system with over 400 volcanoes, kneaded relentlessly by Jupiter\'s tidal forces.',
     stats:[['Diameter','3,643 km'],['Orbital period','1.8 days']]},
    {name:'Europa', color:0xc9c2ae, r:0.55, orbit:10.5, period:3.55, tex:'europa.jpg',
     desc:'Beneath its icy shell lies a liquid-water ocean that may hold twice the water of Earth — one of the most promising places to search for life.',
     stats:[['Diameter','3,122 km'],['Orbital period','3.6 days']]},
    {name:'Ganymede', color:0xa89a88, r:0.8, orbit:12.8, period:7.15, tex:'ganymede.jpg',
     desc:'The largest moon in the solar system, bigger than Mercury, and the only moon with its own magnetic field.',
     stats:[['Diameter','5,268 km'],['Orbital period','7.2 days']]},
    {name:'Callisto', color:0x8f867c, r:0.75, orbit:15.2, period:16.7, tex:'callisto.jpg',
     desc:'The most heavily cratered surface in the solar system — an ancient landscape nearly unchanged for 4 billion years.',
     stats:[['Diameter','4,821 km'],['Orbital period','16.7 days']]}]},
  {name:'Saturn', color:0xe5cf9a, r:5.2, orbit:138, period:10759, rings:true, tex:'saturn.jpg',
   desc:'Famous for its magnificent ring system of ice and rock, spanning 282,000 km yet only about 10 meters thick. Its density is so low it would float on water.',
   stats:[['Diameter','116,460 km'],['Distance from Sun','9.5 AU'],['Orbital period','29.5 years'],['Moons','146']],
   moons:[
    {name:'Enceladus', color:0xdde4ea, r:0.4, orbit:9.5, period:1.37, tex:'moon.jpg', tint:0xe8f0f8,
     desc:'Sprays plumes of ice and water vapor from a subsurface ocean through fissures at its south pole — this material forms Saturn\'s E ring.',
     stats:[['Diameter','504 km'],['Orbital period','1.4 days']]},
    {name:'Titan', color:0xd8b06a, r:0.85, orbit:13, period:15.9, tex:'titan.webp',
     desc:'The only moon with a thick atmosphere, with rivers and lakes of liquid methane — the only world besides Earth with stable surface liquid.',
     stats:[['Diameter','5,150 km'],['Orbital period','15.9 days']]}]},
  {name:'Uranus', color:0x9fd8db, r:3.6, orbit:172, period:30687, tex:'uranus.jpg',
   desc:'An ice giant tilted 98° — it practically rolls along its orbit, giving each pole 42 years of light followed by 42 years of darkness. Its pale blue color comes from methane.',
   stats:[['Diameter','50,724 km'],['Distance from Sun','19.2 AU'],['Orbital period','84 years'],['Moons','28']],
   moons:[{name:'Miranda', color:0xb8bfc9, r:0.4, orbit:6.5, period:1.41, tex:'moon.jpg', tint:0xc4ccd8,
     desc:'A strangely patchwork surface featuring Verona Rupes, a cliff ~20 km tall — the highest known cliff in the solar system.',
     stats:[['Diameter','471 km'],['Orbital period','1.4 days']]}]},
  {name:'Neptune', color:0x5b7fd5, r:3.5, orbit:200, period:60190, tex:'neptune.jpg',
   desc:'The most distant planet, discovered in 1846 through mathematical prediction before it was ever observed. Its winds reach 2,100 km/h — the fastest in the solar system.',
   stats:[['Diameter','49,244 km'],['Distance from Sun','30 AU'],['Orbital period','165 years'],['Moons','16']],
   moons:[{name:'Triton', color:0xc4b8c9, r:0.6, orbit:6.8, period:5.88, tex:'triton.jpg',
     desc:'Orbits backwards relative to Neptune\'s rotation — a sign it is a captured Kuiper Belt object. It has geysers of liquid nitrogen despite being -235°C.',
     stats:[['Diameter','2,707 km'],['Orbital period','5.9 days']]}]}
];
for (const cfg of P){
  const b = makeBody({...cfg, indent:0, fly: cfg.r*5+6});
  if (cfg.rings){
    const rGeo = new THREE.RingGeometry(cfg.r*1.4, cfg.r*2.3, 96);
    const pos = rGeo.attributes.position, uv = rGeo.attributes.uv;
    const mid = cfg.r*1.85, v3 = new THREE.Vector3();
    for (let i=0;i<pos.count;i++){
      v3.fromBufferAttribute(pos, i);
      uv.setXY(i, v3.length() < mid ? 0 : 1, 1);
    }
    const rMat = new THREE.MeshBasicMaterial({color:0xcdb98c, side:THREE.DoubleSide, transparent:true, opacity:0.85});
    loader.load(TEX + 'saturn-ring.png', t => { rMat.map = t; rMat.color.set(0xffffff); rMat.needsUpdate = true; });
    const ring = new THREE.Mesh(rGeo, rMat);
    ring.rotation.x = Math.PI/2 - 0.45;
    b.mesh.add(ring);
  }
  if (cfg.moons) for (const m of cfg.moons) makeBody({...m, indent:1, fly: m.r*7+2.5}, b);
}

const belt = new THREE.Group();
const rockMat = new THREE.MeshLambertMaterial({color:0x8a7a64});
loader.load(TEX + 'moon.jpg', t => { rockMat.map = t; rockMat.color.set(0xa08868); rockMat.needsUpdate = true; });
const rockGeos = [];
for (let v=0; v<4; v++){
  const g = new THREE.SphereGeometry(1, 8, 6);
  const p = g.attributes.position;
  for (let i=0;i<p.count;i++){
    const s = 0.6 + Math.random()*0.55;
    p.setXYZ(i, p.getX(i)*s, p.getY(i)*s*(0.6+Math.random()*0.5), p.getZ(i)*s);
  }
  g.computeVertexNormals();
  rockGeos.push(g);
}
const rocks = [];
const rockCount = isMobile ? 150 : 260;
for (let i=0;i<rockCount;i++){
  const m = new THREE.Mesh(rockGeos[i%4], rockMat);
  const a = Math.random()*Math.PI*2, r = 74 + Math.random()*16;
  m.position.set(Math.cos(a)*r, (Math.random()-0.5)*2.6, Math.sin(a)*r);
  m.scale.setScalar(0.14 + Math.random()*0.42);
  m.rotation.set(Math.random()*6.3, Math.random()*6.3, Math.random()*6.3);
  m.userData.spin = (Math.random()-0.5)*2;
  belt.add(m);
  rocks.push(m);
}
scene.add(belt);

const list = document.getElementById('bodyList');
for (const b of bodies){
  const row = document.createElement('div');
  row.style.cssText = 'display:flex;align-items:center;gap:6px;padding:5px 6px;margin:1px 0;border-radius:6px;cursor:pointer;font-size:12px;color:#c8d1e6;' + (b.indent? 'margin-left:14px;font-size:11px;color:#9aa6c2;':'');
  row.innerHTML = '<span style="width:7px;height:7px;border-radius:50%;background:#'+b.color.toString(16).padStart(6,'0')+';flex:none;"></span>' + b.name;
  row.addEventListener('click', () => selectBody(b));
  b.row = row;
  list.appendChild(row);
  const lbl = document.createElement('div');
  lbl.textContent = b.name;
  lbl.style.cssText = 'position:absolute;font-size:11px;color:rgba(225,232,248,0.8);transform:translate(-50%,-100%);white-space:nowrap;';
  labelLayer.appendChild(lbl);
  b.label = lbl;
}

let selected = null, camDist = 32, camTheta = 0.8, camPhi = 1.15, targetDist = 32;
let days = 0, playing = true, speed = 10, showLabels = true;
const startDate = new Date();

function selectBody(b){
  if (selected) selected.row.style.background = '';
  selected = b;
  b.row.style.background = 'rgba(95,125,220,0.35)';
  targetDist = b.fly;
  document.getElementById('ipName').textContent = b.name;
  document.getElementById('ipDesc').textContent = b.desc || '';
  const img = document.getElementById('ipImg');
  if (b.tex){ img.src = TEX + b.tex; img.style.display = ''; } else { img.style.display = 'none'; }
  const st = document.getElementById('ipStats');
  st.innerHTML = '';
  for (const [k,v] of (b.stats||[])){
    const r = document.createElement('div');
    r.style.cssText = 'display:flex;justify-content:space-between;gap:8px;font-size:11px;padding:3px 0;';
    r.innerHTML = '<span style="color:#7c87a3;">'+k+'</span><span style="color:#dfe6f5;text-align:right;">'+v+'</span>';
    st.appendChild(r);
  }
  ip.style.display = '';
  if (isMobile) panel.classList.remove('open');
}
document.getElementById('ipClose').addEventListener('click', () => { ip.style.display = 'none'; });

const pointers = new Map();
let moved = 0, pinchDist = 0;
canvas.addEventListener('pointerdown', e => {
  pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if (pointers.size === 1) moved = 0;
  if (pointers.size === 2){
    const [a,b] = [...pointers.values()];
    pinchDist = Math.hypot(a.x-b.x, a.y-b.y);
  }
  canvas.style.cursor = 'grabbing';
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', e => {
  if (!pointers.has(e.pointerId)) return;
  const prev = pointers.get(e.pointerId);
  const dx = e.clientX - prev.x, dy = e.clientY - prev.y;
  pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
  moved += Math.abs(dx) + Math.abs(dy);
  if (pointers.size === 1){
    camTheta -= dx * 0.006;
    camPhi = Math.min(Math.PI - 0.15, Math.max(0.15, camPhi - dy * 0.006));
  } else if (pointers.size === 2){
    const [a,b] = [...pointers.values()];
    const d = Math.hypot(a.x-b.x, a.y-b.y);
    if (pinchDist > 0){
      targetDist = Math.min(600, Math.max((selected?selected.r:9)*2.5, targetDist * pinchDist / d));
    }
    pinchDist = d;
  }
});
function endPointer(e){
  const wasSingle = pointers.size === 1;
  pointers.delete(e.pointerId);
  pinchDist = 0;
  if (pointers.size === 0) canvas.style.cursor = 'grab';
  if (wasSingle && moved < 8){
    const rect = canvas.getBoundingClientRect();
    const m = new THREE.Vector2(((e.clientX-rect.left)/rect.width)*2-1, -((e.clientY-rect.top)/rect.height)*2+1);
    const ray = new THREE.Raycaster();
    ray.setFromCamera(m, camera);
    const hits = ray.intersectObjects(bodies.map(b=>b.mesh));
    if (hits.length) selectBody(hits[0].object.userData.body);
  }
}
canvas.addEventListener('pointerup', endPointer);
canvas.addEventListener('pointercancel', endPointer);
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  targetDist = Math.min(600, Math.max((selected?selected.r:9)*2.5, targetDist * (e.deltaY > 0 ? 1.12 : 0.89)));
}, {passive:false});

document.getElementById('spd').addEventListener('input', e => {
  speed = Number(e.target.value);
  document.getElementById('spdOut').textContent = speed + ' days/s';
});
document.getElementById('playBtn').addEventListener('click', () => {
  playing = !playing;
  const btn = document.getElementById('playBtn');
  btn.textContent = playing ? '❚❚' : '▶';
  btn.style.fontSize = playing ? '11px' : '13px';
  btn.setAttribute('aria-label', playing ? 'Pause' : 'Play');
});
document.getElementById('cbOrbit').addEventListener('change', e => {
  for (const b of bodies) if (b.orbitLine) b.orbitLine.visible = e.target.checked;
});
document.getElementById('cbLabel').addEventListener('change', e => { showLabels = e.target.checked; });
document.getElementById('cbBelt').addEventListener('change', e => { belt.visible = e.target.checked; });

applyLayout();
selectBody(sun);
if (isMobile) ip.style.display = 'none';

const tmp = new THREE.Vector3();
let lastT = null;
function tick(t){
  if (lastT === null) lastT = t;
  const dt = Math.min((t-lastT)/1000, 0.1); lastT = t;
  if (playing){
    days += speed*dt;
    for (const b of bodies) if (b.period){
      b.angle += (2*Math.PI/b.period)*speed*dt;
      b.mesh.position.set(Math.cos(b.angle)*b.orbit, 0, Math.sin(b.angle)*b.orbit);
    }
    belt.rotation.y += (2*Math.PI/1800)*speed*dt;
    for (const r of rocks) r.rotation.y += r.userData.spin*dt;
    const d = new Date(startDate.getTime() + days*86400000);
    document.getElementById('simDate').textContent = d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
  }
  for (const b of bodies) b.mesh.rotation.y += 0.3*dt;

  camDist += (targetDist - camDist) * Math.min(1, dt*4);
  selected.mesh.getWorldPosition(tmp);
  camera.position.set(
    tmp.x + camDist*Math.sin(camPhi)*Math.cos(camTheta),
    tmp.y + camDist*Math.cos(camPhi),
    tmp.z + camDist*Math.sin(camPhi)*Math.sin(camTheta));
  camera.lookAt(tmp);

  const w = wrap.clientWidth, h = wrap.clientHeight;
  for (const b of bodies){
    if (!showLabels || b.indent && selected.parent !== b.parent && selected !== b.parent && selected !== b){
      b.label.style.display = 'none'; continue;
    }
    b.mesh.getWorldPosition(tmp);
    const v = tmp.clone().project(camera);
    if (v.z > 1 || v.x < -1 || v.x > 1 || v.y < -1 || v.y > 1){ b.label.style.display = 'none'; continue; }
    b.label.style.display = '';
    b.label.style.left = ((v.x+1)/2*w) + 'px';
    b.label.style.top = ((-v.y+1)/2*h - 10) + 'px';
  }
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
resize();
requestAnimationFrame(tick);
</script>
</body>
</html>
